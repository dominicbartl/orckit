project: counter

processes:
  ticker:
    category: counters
    command: |
      for i in $(seq 1 60); do
        printf 'tick %d\n' "$i"
        sleep 1
      done
    ready:
      type: log-pattern
      pattern: 'tick 1'

  tocker:
    category: counters
    command: |
      for i in $(seq 1 30); do
        printf 'tock %d\n' "$i"
        sleep 2
      done
    depends_on: [ticker]
    ready:
      type: log-pattern
      pattern: 'tock 1'
